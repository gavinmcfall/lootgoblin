name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run typecheck
      - run: npm run test
        env:
          # Vitest config already injects a dummy for tests; this is for any stray env read at module load.
          LOOTGOBLIN_SECRET: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: lootgoblin:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
