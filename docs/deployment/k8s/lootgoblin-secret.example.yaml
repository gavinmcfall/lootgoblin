# Example k8s Secret for LootGoblin. In production use sealed-secrets /
# external-secrets / SOPS — don't commit plaintext.
apiVersion: v1
kind: Secret
metadata:
  name: lootgoblin-secret
  namespace: lootgoblin
type: Opaque
stringData:
  # 32+ bytes hex; generate with: openssl rand -hex 32
  LOOTGOBLIN_SECRET: "REPLACE_WITH_OPENSSL_RAND_HEX_32"
  # Only needed if AUTH_METHODS includes oidc
  OIDC_CLIENT_SECRET: "REPLACE_FROM_OIDC_PROVIDER"
